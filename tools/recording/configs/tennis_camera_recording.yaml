schema_version: tennisbot.recording.config.v1

capture:
  width: 3840
  height: 2160
  fps: 30
  input_format: mjpeg
  pixel_format: MJPG
  settle_seconds: 1.0

recording:
  output_root: runs/recording
  container: mkv
  sample_fps: null
  thread_queue_size: 1024

single:
  device: /dev/video0
  output_label: video0

dual:
  devices:
    - /dev/video2
    - /dev/video0
  preview: false
  soft_sync: true
  parallel_capture: true

preview:
  width: 960
  fps: 10
  port: 23456

controls:
  auto_exposure: 1
  exposure_time_absolute: 200
  white_balance_automatic: 0
  white_balance_temperature: 4600
  brightness: -5
  contrast: 1
  saturation: 64
  gamma: 100
  gain: 32
  power_line_frequency: 1
  sharpness: 1
  backlight_compensation: 0
  focus_automatic_continuous: 0
  focus_absolute: null
