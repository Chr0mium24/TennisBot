          const saved = await saveCurrent();
          if (saved) {
            await go(1);
          }
        } else {
          await saveCurrent();
        }
      }

      canvas.addEventListener("pointerup", finishPointer);
      canvas.addEventListener("pointercancel", finishPointer);
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      canvas.addEventListener("wheel", (event) => {
        if (!currentImage) {
          return;
        }
        event.preventDefault();
        zoomAt(canvasPoint(event), event.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP);
      }, { passive: false });

      buttons.toggleSidebar.addEventListener("click", toggleSidebar);
      buttons.pickImages.addEventListener("click", () => {
        pickImages().catch((error) => {
          console.error(error);
          setStatus(error.message || "Could not open images");
        });
      });
      buttons.pickLabels.addEventListener("click", () => {
        pickLabels().catch((error) => {
          console.error(error);
          setStatus(error.message || "Could not open labels");
        });
      });
      buttons.prev.addEventListener("click", () => go(-1));
      buttons.next.addEventListener("click", () => saveAndGoNext());
      buttons.jump.addEventListener("click", () => jumpToInputIndex());
      jumpIndexInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          jumpToInputIndex();
        }
      });
      buttons.save.addEventListener("click", () => saveCurrent());
      buttons.autoDetect.addEventListener("click", () => {
        toggleAutoAnnotate().catch((error) => {
          console.error(error);
          setStatus(error.message || "Auto annotation failed");
        });
      });
      buttons.panMode.addEventListener("click", togglePanMode);
      buttons.zoomOut.addEventListener("click", () => zoomAt(centerPoint(), 1 / ZOOM_STEP));
      buttons.zoomIn.addEventListener("click", () => zoomAt(centerPoint(), ZOOM_STEP));
      buttons.zoomReset.addEventListener("click", resetZoom);
      buttons.clear.addEventListener("click", async () => {
        box = null;
        render();
        await saveCurrent({ allowEmptyOverwrite: true });
      });
      buttons.exclude.addEventListener("click", () => {
        toggleExcluded();
      });

      document.addEventListener("keydown", async (event) => {
        if (isEditableTarget(event.target)) {
          return;
        }
        if (event.code === "Space") {
          event.preventDefault();
          isSpaceDown = true;
          updateCanvasCursor();
          return;
        }
        if (event.ctrlKey || event.metaKey || event.altKey) {
          return;
        }
        const key = event.key.toLowerCase();
        if (key === "a") {
          event.preventDefault();
          await go(-1);
        } else if (key === "d") {
          event.preventDefault();
          await saveAndGoNext();
        } else if (key === "t") {
          event.preventDefault();
          await toggleAutoAnnotate();
        } else if (key === "c") {
          event.preventDefault();
          await centerCurrentBoxOrAuto();
        } else if (key === "p") {
          event.preventDefault();
          togglePanMode();
        } else if (key === "x") {
          event.preventDefault();
          await toggleExcluded();
        } else if (key === "q" || event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          box = null;
          render();
          await saveCurrent({ allowEmptyOverwrite: true });
        } else if (key === "-" || key === "_") {
          event.preventDefault();
          zoomAt(centerPoint(), 1 / ZOOM_STEP);
        } else if (key === "+" || key === "=") {
          event.preventDefault();
          zoomAt(centerPoint(), ZOOM_STEP);
        } else if (key === "0") {
          event.preventDefault();
          resetZoom();
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.code === "Space") {
          isSpaceDown = false;
          updateCanvasCursor();
        }
      });

      window.addEventListener("resize", resizeCanvas);
      if ("ResizeObserver" in window) {
        new ResizeObserver(resizeCanvas).observe(canvas);
      }
      updateUi();
      resizeCanvas();
      initBackend();
    })();
  </script>
</body>
</html>
