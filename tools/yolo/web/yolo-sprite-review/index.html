<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TennisBot YOLO Sprite Review</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #f6f7f4;
      color: #171b19;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #d8ddd4;
      background: #fbfcf8;
    }

    .title {
      font-weight: 700;
      margin-right: 8px;
      white-space: nowrap;
    }

    .status {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #5f6963;
      flex: 1;
    }

    .button {
      height: 34px;
      min-width: 38px;
      border: 1px solid #c7cec6;
      border-radius: 6px;
      background: #fff;
      color: #1c231f;
      font-weight: 650;
      padding: 0 12px;
      cursor: pointer;
    }

    .button:hover {
      background: #eef2ed;
    }

    .button.primary {
      border-color: #9dc5ae;
      background: #e8f6ee;
      color: #134326;
    }

    .button.danger {
      border-color: #e3b2b2;
      background: #fff0f0;
      color: #7b1f25;
    }

    .layout {
      height: calc(100% - 56px);
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-width: 0;
    }

    .sidebar {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid #d8ddd4;
      background: #fbfcf8;
    }

    .list-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 8px;
      width: 100%;
      border: 0;
      border-bottom: 1px solid #e4e8e1;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 10px 12px;
      cursor: pointer;
    }

    .list-item:hover,
    .list-item.active {
      background: #eef2ed;
    }

    .list-id {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .badge {
      border: 1px solid #cbd3cb;
      border-radius: 999px;
      padding: 1px 7px;
      color: #516058;
      font-size: 12px;
      align-self: start;
    }

    .source {
      grid-column: 1 / -1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #69736c;
      font-size: 12px;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 168px;
      background: #eef1ec;
    }

    .canvas-wrap {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      background: #20251f;
      image-rendering: auto;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
      touch-action: none;
    }

    .preview-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      border-top: 1px solid #d8ddd4;
      padding: 12px;
      background: #fbfcf8;
    }

    .preview {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #d8ddd4;
      border-radius: 6px;
    }

    .preview.dark {
      background: #141816;
    }

    .preview.light {
      background:
        linear-gradient(45deg, #e1e5df 25%, transparent 25%),
        linear-gradient(-45deg, #e1e5df 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e1e5df 75%),
        linear-gradient(-45deg, transparent 75%, #e1e5df 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
      background-color: #fff;
    }

    .preview img {
      max-width: 140px;
      max-height: 140px;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title">Sprite Review</div>
    <button class="button" id="previous">Prev</button>
    <button class="button" id="next">Next</button>
    <button class="button" id="reset">Reset</button>
    <button class="button" id="reload">Reload</button>
    <button class="button primary" id="save">Save</button>
    <button class="button primary" id="approve">Approve</button>
    <button class="button danger" id="reject">Reject</button>
    <div class="status" id="status">Loading sprites...</div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="spriteList"></aside>

    <main class="workspace">
      <div class="canvas-wrap">
        <canvas id="canvas" width="640" height="480"></canvas>
      </div>
      <div class="preview-strip">
        <div class="preview light"><img id="previewLight" alt="sprite preview on light background"></div>
        <div class="preview dark"><img id="previewDark" alt="sprite preview on dark background"></div>
      </div>
    </main>
  </div>

  <script>
    const ELLIPSE_FIT_POINTS = 5;
    const FIT_POINT_PHASES = Array.from({ length: ELLIPSE_FIT_POINTS }, (_, index) => (index / ELLIPSE_FIT_POINTS) * Math.PI * 2);

    const state = {
      sprites: [],
      index: -1,
      current: null,
      cropImage: new Image(),
      defaults: null,
      mask: null,
      fitPoints: [],
      interaction: null,
    };

    const elements = {
      list: document.getElementById("spriteList"),
      status: document.getElementById("status"),
      canvas: document.getElementById("canvas"),
      previous: document.getElementById("previous"),
      next: document.getElementById("next"),
      reset: document.getElementById("reset"),
      save: document.getElementById("save"),
      approve: document.getElementById("approve"),
      reject: document.getElementById("reject"),
      reload: document.getElementById("reload"),
      previewLight: document.getElementById("previewLight"),
      previewDark: document.getElementById("previewDark"),
    };

    function setStatus(text) {
      elements.status.textContent = text;
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${response.status} ${text}`);
      }
      return response.json();
    }

    async function loadSprites() {
      const payload = await requestJson("/api/sprites");
      state.sprites = payload.sprites;
      renderList();
      if (state.sprites.length === 0) {
        setStatus("No sprite candidates found");
        return;
      }
      await selectSprite(Math.max(0, state.index));
    }

    function renderList() {
      elements.list.textContent = "";
      for (const [index, sprite] of state.sprites.entries()) {
        const button = document.createElement("button");
        button.className = `list-item${index === state.index ? " active" : ""}`;
        button.type = "button";
        button.addEventListener("click", () => selectSprite(index));
        button.innerHTML = `
          <span class="list-id"></span>
          <span class="badge"></span>
          <span class="source"></span>
        `;
        button.querySelector(".list-id").textContent = sprite.id;
        button.querySelector(".badge").textContent = sprite.status;
        button.querySelector(".source").textContent = sprite.source.image;
        elements.list.appendChild(button);
      }
    }

    async function selectSprite(index) {
      if (index < 0 || index >= state.sprites.length) return;
      state.index = index;
      const id = state.sprites[index].id;
      const sprite = await requestJson(`/api/sprites/${encodeURIComponent(id)}`);
      state.current = sprite;
      state.mask = normalizeMask(sprite.mask, sprite.crop);
      state.defaults = defaultMask(sprite);
      state.fitPoints = maskToFitPoints(state.mask);
      state.interaction = null;
      elements.previewLight.src = `${sprite.urls.sprite}?t=${Date.now()}`;
      elements.previewDark.src = elements.previewLight.src;
      state.cropImage = new Image();
      state.cropImage.onload = drawCanvas;
      state.cropImage.src = `${sprite.urls.crop}?t=${Date.now()}`;
      renderList();
      setStatus(`${state.index + 1}/${state.sprites.length} ${sprite.id}`);
    }

    function finiteNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function defaultMask(sprite) {
      return {
        center_x: sprite.crop.width / 2,
        center_y: sprite.crop.height / 2,
        radius_x: Math.max(1, sprite.crop.width * 0.32),
        radius_y: Math.max(1, sprite.crop.height * 0.32),
        rotation_deg: 0,
        feather_px: sprite.mask.feather_px ?? 4,
      };
    }

    function normalizeMask(mask, crop) {
      const fallback = defaultMask({ crop, mask: mask || {} });
      const width = Math.max(1, crop.width);
      const height = Math.max(1, crop.height);
      return {
        center_x: clamp(finiteNumber(mask?.center_x, fallback.center_x), 0, width),
        center_y: clamp(finiteNumber(mask?.center_y, fallback.center_y), 0, height),
        radius_x: Math.max(1, finiteNumber(mask?.radius_x, fallback.radius_x)),
        radius_y: Math.max(1, finiteNumber(mask?.radius_y, fallback.radius_y)),
        rotation_deg: normalizeRotationDeg(finiteNumber(mask?.rotation_deg, fallback.rotation_deg)),
        feather_px: Math.max(0, Math.round(finiteNumber(mask?.feather_px, fallback.feather_px))),
      };
    }

    function normalizeRotationDeg(degrees) {
      const normalized = ((((degrees + 180) % 360) + 360) % 360) - 180;
      return normalized === -180 ? 180 : normalized;
    }

    function rotatePoint(x, y, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return [x * cos - y * sin, x * sin + y * cos];
    }

    function clonePoints(points) {
      return points.map((point) => [point[0], point[1]]);
    }

    function clampPoint(point) {
      const width = state.current?.crop.width ?? elements.canvas.width;
      const height = state.current?.crop.height ?? elements.canvas.height;
      return [clamp(point[0], 0, width), clamp(point[1], 0, height)];
    }

    function maskToFitPoints(mask) {
      const angle = (mask.rotation_deg * Math.PI) / 180;
      return FIT_POINT_PHASES.map((theta) => {
        const [dx, dy] = rotatePoint(Math.cos(theta) * mask.radius_x, Math.sin(theta) * mask.radius_y, angle);
        return clampPoint([mask.center_x + dx, mask.center_y + dy]);
      });
    }

    function solveLinearSystem(matrix, values) {
      const size = values.length;
      const rows = matrix.map((row, index) => [...row, values[index]]);
      for (let col = 0; col < size; col += 1) {
        let pivot = col;
        for (let row = col + 1; row < size; row += 1) {
          if (Math.abs(rows[row][col]) > Math.abs(rows[pivot][col])) pivot = row;
        }
        if (Math.abs(rows[pivot][col]) < 1e-10) return null;
        if (pivot !== col) [rows[pivot], rows[col]] = [rows[col], rows[pivot]];

        const pivotValue = rows[col][col];
        for (let cell = col; cell <= size; cell += 1) rows[col][cell] /= pivotValue;

        for (let row = 0; row < size; row += 1) {
          if (row === col) continue;
          const factor = rows[row][col];
          for (let cell = col; cell <= size; cell += 1) rows[row][cell] -= factor * rows[col][cell];
        }
      }

      return rows.map((row) => row[size]);
    }

    function fitEllipseFromBoundaryPoints(points, crop) {
      if (points.length !== ELLIPSE_FIT_POINTS || crop.width <= 0 || crop.height <= 0) return null;
      const meanX = points.reduce((sum, point) => sum + point[0], 0) / points.length;
      const meanY = points.reduce((sum, point) => sum + point[1], 0) / points.length;
      const matrix = points.map(([x, y]) => {
        const u = x - meanX;
        const v = y - meanY;
        return [u * u, u * v, v * v, u, v];
      });
      const coeffs = solveLinearSystem(matrix, Array(ELLIPSE_FIT_POINTS).fill(1));
      if (!coeffs) return null;

      const [a, b, c, d, e] = coeffs;
      const q = b / 2;
      const det = a * c - q * q;
      if (!(a > 0 && c > 0 && det > 1e-12)) return null;

      const centerLocalX = (q * e - c * d) / (2 * det);
      const centerLocalY = (q * d - a * e) / (2 * det);
      const centerValue =
        a * centerLocalX * centerLocalX +
        2 * q * centerLocalX * centerLocalY +
        c * centerLocalY * centerLocalY +
        d * centerLocalX +
        e * centerLocalY;
      const radiusScale = 1 - centerValue;
      if (!(radiusScale > 0)) return null;

      const trace = a + c;
      const disc = Math.sqrt(Math.max(0, (a - c) ** 2 + 4 * q * q));
      const lambdaSmall = (trace - disc) / 2;
      const lambdaLarge = (trace + disc) / 2;
      if (!(lambdaSmall > 0 && lambdaLarge > 0)) return null;

      let vectorX = q;
      let vectorY = lambdaSmall - a;
      if (Math.hypot(vectorX, vectorY) < 1e-9) {
        vectorX = a <= c ? 1 : 0;
        vectorY = a <= c ? 0 : 1;
      }

      const centerX = meanX + centerLocalX;
      const centerY = meanY + centerLocalY;
      const radiusX = Math.sqrt(radiusScale / lambdaSmall);
      const radiusY = Math.sqrt(radiusScale / lambdaLarge);
      const maxReasonableRadius = Math.max(crop.width, crop.height) * 2;
      if (
        !Number.isFinite(centerX) ||
        !Number.isFinite(centerY) ||
        !Number.isFinite(radiusX) ||
        !Number.isFinite(radiusY) ||
        centerX < 0 ||
        centerX > crop.width ||
        centerY < 0 ||
        centerY > crop.height ||
        radiusX < 1 ||
        radiusY < 1 ||
        radiusX > maxReasonableRadius ||
        radiusY > maxReasonableRadius
      ) {
        return null;
      }

      return {
        center_x: centerX,
        center_y: centerY,
        radius_x: radiusX,
        radius_y: radiusY,
        rotation_deg: normalizeRotationDeg((Math.atan2(vectorY, vectorX) * 180) / Math.PI),
      };
    }

    function applyFitPoints(points) {
      if (!state.current) return false;
      const ellipse = fitEllipseFromBoundaryPoints(points, state.current.crop);
      if (!ellipse) {
        setStatus("Ellipse fit failed");
        return false;
      }
      state.fitPoints = points;
      state.mask = { ...state.mask, ...ellipse };
      drawCanvas();
      return true;
    }

    function drawCanvas() {
      const canvas = elements.canvas;
      const context = canvas.getContext("2d");
      if (!state.cropImage.complete || !state.current) {
        context.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      canvas.width = state.current.crop.width;
      canvas.height = state.current.crop.height;
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.drawImage(state.cropImage, 0, 0);
      drawMaskOverlay(context);
      drawFitPointHandles(context);
    }

    function drawMaskOverlay(context) {
      if (!state.mask) return;
      const canvas = elements.canvas;
      context.save();
      context.translate(state.mask.center_x, state.mask.center_y);
      context.rotate((state.mask.rotation_deg * Math.PI) / 180);
      context.beginPath();
      context.ellipse(0, 0, state.mask.radius_x, state.mask.radius_y, 0, 0, Math.PI * 2);
      context.fillStyle = "rgba(16, 185, 129, 0.26)";
      context.strokeStyle = "rgba(5, 150, 105, 0.95)";
      context.lineWidth = Math.max(1, Math.min(canvas.width, canvas.height) / 120);
      context.fill();
      context.stroke();
      context.restore();
    }

    function handleRadius() {
      if (!state.current) return 6;
      return Math.max(4, Math.min(7, Math.min(state.current.crop.width, state.current.crop.height) / 24));
    }

    function handleHitRadius() {
      return handleRadius() + 8;
    }

    function drawHandle(context, point, active) {
      const radius = handleRadius();
      context.beginPath();
      context.arc(point[0], point[1], active ? radius + 2 : radius, 0, Math.PI * 2);
      context.fillStyle = active ? "#fff3cc" : "#fff";
      context.strokeStyle = "rgba(5, 150, 105, 0.98)";
      context.lineWidth = 2;
      context.fill();
      context.stroke();
    }

    function drawFitPointHandles(context) {
      for (const [index, point] of state.fitPoints.entries()) {
        drawHandle(context, point, state.interaction?.type === "fit-point" && state.interaction.pointIndex === index);
      }
    }

    function canvasPoint(event) {
      const rect = elements.canvas.getBoundingClientRect();
      const scaleX = elements.canvas.width / Math.max(1, rect.width);
      const scaleY = elements.canvas.height / Math.max(1, rect.height);
      return [(event.clientX - rect.left) * scaleX, (event.clientY - rect.top) * scaleY];
    }

    function hitFitPoint(x, y) {
      let best = null;
      const hitRadius = handleHitRadius();
      state.fitPoints.forEach((point, index) => {
        const distance = Math.hypot(x - point[0], y - point[1]);
        if (distance <= hitRadius && (!best || distance < best.distance)) {
          best = { index, distance };
        }
      });
      return best?.index ?? -1;
    }

    function pointInEllipse(x, y) {
      if (!state.mask) return false;
      const angle = (state.mask.rotation_deg * Math.PI) / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const dx = x - state.mask.center_x;
      const dy = y - state.mask.center_y;
      const localX = dx * cos + dy * sin;
      const localY = -dx * sin + dy * cos;
      return (localX / state.mask.radius_x) ** 2 + (localY / state.mask.radius_y) ** 2 <= 1;
    }

    function updateCanvasCursor(x, y) {
      if (!state.current || state.interaction) {
        elements.canvas.style.cursor = state.interaction ? "grabbing" : "default";
        return;
      }
      if (hitFitPoint(x, y) >= 0) {
        elements.canvas.style.cursor = "pointer";
      } else if (pointInEllipse(x, y)) {
        elements.canvas.style.cursor = "move";
      } else {
        elements.canvas.style.cursor = "default";
      }
    }

    function moveFitPoints(startPoints, x, y) {
      const crop = state.current.crop;
      const dx = x - state.interaction.start[0];
      const dy = y - state.interaction.start[1];
      const xs = startPoints.map((point) => point[0]);
      const ys = startPoints.map((point) => point[1]);
      const clampedDx = clamp(dx, -Math.min(...xs), crop.width - Math.max(...xs));
      const clampedDy = clamp(dy, -Math.min(...ys), crop.height - Math.max(...ys));
      return startPoints.map((point) => [point[0] + clampedDx, point[1] + clampedDy]);
    }

    function startCanvasInteraction(event) {
      if (!state.current || !state.cropImage.complete) return;
      const [x, y] = canvasPoint(event);
      const pointIndex = hitFitPoint(x, y);
      if (pointIndex >= 0) {
        state.interaction = { type: "fit-point", pointIndex, pointerId: event.pointerId };
      } else if (pointInEllipse(x, y)) {
        state.interaction = {
          type: "move",
          start: [x, y],
          startFitPoints: clonePoints(state.fitPoints),
          pointerId: event.pointerId,
        };
      } else {
        updateCanvasCursor(x, y);
        return;
      }
      elements.canvas.setPointerCapture(event.pointerId);
      updateCanvasCursor(x, y);
      event.preventDefault();
    }

    function updateCanvasInteraction(event) {
      const [x, y] = canvasPoint(event);
      if (!state.interaction) {
        updateCanvasCursor(x, y);
        return;
      }

      if (state.interaction.type === "fit-point") {
        const points = clonePoints(state.fitPoints);
        points[state.interaction.pointIndex] = clampPoint([x, y]);
        applyFitPoints(points);
      } else if (state.interaction.type === "move") {
        applyFitPoints(moveFitPoints(state.interaction.startFitPoints, x, y));
      }
      event.preventDefault();
    }

    function stopCanvasInteraction(event) {
      if (!state.interaction || state.interaction.pointerId !== event.pointerId) return;
      try {
        elements.canvas.releasePointerCapture(event.pointerId);
      } catch {
        // Pointer capture may already be released by the browser.
      }
      state.interaction = null;
      const [x, y] = canvasPoint(event);
      updateCanvasCursor(x, y);
      drawCanvas();
    }

    async function saveMask() {
      if (!state.current) return;
      const payload = {
        center_x: Number(state.mask.center_x),
        center_y: Number(state.mask.center_y),
        radius_x: Number(state.mask.radius_x),
        radius_y: Number(state.mask.radius_y),
        rotation_deg: Number(state.mask.rotation_deg),
        feather_px: Math.max(0, Math.round(Number(state.mask.feather_px))),
      };
      const result = await requestJson(`/api/sprites/${encodeURIComponent(state.current.id)}/mask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      state.current = result.sprite;
      state.mask = normalizeMask(state.current.mask, state.current.crop);
      elements.previewLight.src = `${state.current.urls.sprite}?t=${Date.now()}`;
      elements.previewDark.src = elements.previewLight.src;
      drawCanvas();
      setStatus(`Saved ${state.current.id}`);
    }

    async function review(action) {
      if (!state.current) return;
      await saveMask();
      await requestJson(`/api/sprites/${encodeURIComponent(state.current.id)}/${action}`, { method: "POST" });
      setStatus(`${action === "approve" ? "Approved" : "Rejected"} ${state.current.id}`);
      await loadSprites();
    }

    elements.previous.addEventListener("click", () => selectSprite(state.index - 1));
    elements.next.addEventListener("click", () => selectSprite(state.index + 1));
    elements.reset.addEventListener("click", () => {
      if (!state.defaults) return;
      state.mask = normalizeMask(state.defaults, state.current.crop);
      state.fitPoints = maskToFitPoints(state.mask);
      state.interaction = null;
      drawCanvas();
    });
    elements.save.addEventListener("click", () => saveMask().catch((error) => setStatus(error.message)));
    elements.approve.addEventListener("click", () => review("approve").catch((error) => setStatus(error.message)));
    elements.reject.addEventListener("click", () => review("reject").catch((error) => setStatus(error.message)));
    elements.reload.addEventListener("click", () => loadSprites().catch((error) => setStatus(error.message)));

    elements.canvas.addEventListener("pointerdown", startCanvasInteraction);
    elements.canvas.addEventListener("pointermove", updateCanvasInteraction);
    elements.canvas.addEventListener("pointerup", stopCanvasInteraction);
    elements.canvas.addEventListener("pointercancel", stopCanvasInteraction);
    elements.canvas.addEventListener("pointerleave", (event) => {
      if (!state.interaction) updateCanvasCursor(...canvasPoint(event));
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") selectSprite(state.index - 1);
      if (event.key === "ArrowRight") selectSprite(state.index + 1);
      if (event.key.toLowerCase() === "s") saveMask().catch((error) => setStatus(error.message));
      if (event.key.toLowerCase() === "a") review("approve").catch((error) => setStatus(error.message));
      if (event.key.toLowerCase() === "x") review("reject").catch((error) => setStatus(error.message));
    });

    loadSprites().catch((error) => setStatus(error.message));
  </script>
</body>
</html>
