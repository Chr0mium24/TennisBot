[project]
name = "tennisbot-vision"
version = "0.1.0"
description = "Shared TennisBot camera and vision diagnostic capabilities"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24,<3",
  "opencv-python>=4.8",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
detect = ["ultralytics>=8.3"]
test = ["pytest>=8.0"]

[project.scripts]
tennisbot-camera = "tennisbot_camera.cli:main"
tennisbot-test = "tennisbot_vision.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tennisbot_camera", "src/tennisbot_vision"]

[tool.pytest.ini_options]
testpaths = ["tests"]

