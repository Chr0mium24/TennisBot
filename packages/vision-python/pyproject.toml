[project]
name = "tennisbot-vision"
version = "0.1.0"
description = "Shared TennisBot camera and vision diagnostic capabilities"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24,<3",
  "opencv-python>=4.8",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
detect = [
  "torch>=2.11.0",
  "torchvision>=0.26.0",
  "ultralytics>=8.3",
]
detect-cuda = [
  "torch>=2.11.0",
  "torchvision>=0.26.0",
  "ultralytics>=8.3",
]
test = ["pytest>=8.0"]

[tool.uv]
conflicts = [
  [
    { extra = "detect" },
    { extra = "detect-cuda" },
  ],
]

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", extra = "detect" },
  { index = "pytorch-cu130", extra = "detect-cuda" },
]
torchvision = [
  { index = "pytorch-cpu", extra = "detect" },
  { index = "pytorch-cu130", extra = "detect-cuda" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[project.scripts]
tennisbot-camera = "tennisbot_camera.cli:main"
tennisbot-test = "tennisbot_vision.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tennisbot_camera", "src/tennisbot_vision"]

[tool.pytest.ini_options]
testpaths = ["tests"]
