target_manager:
  ros__parameters:
    raw_topic: /target/raw
    managed_topic: /target/managed

    # 30 Hz input -> retain roughly 0.5 seconds of recent predictions.
    buffer_size: 15

    # Manager output and planner replanning are limited to at most 10 Hz.
    max_output_rate: 10.0

    # Spatial thresholds in metres. Catching area is 0.23 m x 0.23 m.
    noise_deadband: 0.03
    replan_distance: 0.08
    large_jump_distance: 0.50
    jump_confirm_radius: 0.10
    jump_confirm_frames: 3

    stable_window_size: 5
    stable_range_x: 0.05
    stable_range_y: 0.05

    # Per-axis filter weight derived from the vision-provided standard
    # deviation: alpha = sigma_reference / (sigma + sigma_reference).
    sigma_reference: 0.10
    alpha_min: 0.15
    alpha_max: 0.85

    # Changes below 3 cm are still accumulated, but at a reduced weight.
    deadband_alpha_scale: 0.50

    future_stamp_tolerance: 0.02
    max_predicted_time: 5.0

    # Broad sanity bounds around the tennis court, in metres.
    max_abs_target_x: 15.0
    max_abs_target_y: 8.0

chassis_position_publisher:
  ros__parameters:
    # Input from sim_sensor or real chassis_sensor:
    # Float64MultiArray [x, y, v, phi, yaw, ground_speed]
    state_topic: /robot/chassis_state

    # Output consumed by the vision layer.
    position_topic: /robot/chassis_position

    # Vision camera is 30 Hz, so publish chassis position at the same rate.
    publish_rate_hz: 30.0

    # Do not publish stale position if chassis_state stops updating.
    max_state_age_s: 0.20
    publish_stale_state: false
