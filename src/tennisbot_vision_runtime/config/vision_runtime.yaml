vision_runtime:
  ros__parameters:
    chassis_position_topic: /robot/chassis_position
    raw_target_topic: /target/raw
    # /robot/chassis_position is target_msgs/ChassisPosition:
    # publish_stamp, sequence_id, x_m, y_m, yaw_rad.
    # x/y/yaw must already be in the field/interface frame.
    runtime_rate_hz: 30.0
    enable_camera: true
    dry_run: false

    # Runtime stereo tool import path. In the repo workspace this points to the
    # existing OpenCV stereo code; deployments can override it or install the
    # package into the ROS environment.
    stereo_tool_python_path: tools/stereo/src

    left_device: /dev/video0
    right_device: /dev/video2
    width: 3840
    height: 2160
    fps: 30.0
    fourcc: MJPG
    warmup_frames: 5

    calibration_package: artifacts/calibration/stereo_cam1_cam2
    model_path: artifacts/models/tennis_ball_yolo/model.pt
    conf: 0.05
    iou: 0.50
    # Main YOLO strategy:
    # - unlocked: full-frame search at high input resolution
    # - locked: one ROI per camera centered from the previous stereo match
    # - lost: after roi_lost_after_misses frames without a valid stereo match,
    #   return to full-frame search
    imgsz: 1536
    search_imgsz: 1536
    roi_imgsz: 960
    max_detections: 6
    yolo_device: ""
    class_id: 0
    tile: false
    tile_width: 2048
    tile_height: 1216
    tile_overlap: 160
    roi_tracking: true
    roi_width: 1024
    roi_height: 576
    roi_expanded_width: 1280
    roi_expanded_height: 720
    roi_lost_after_misses: 3
    roi_expand_after_misses: 1
    roi_edge_margin_ratio: 0.20
    roi_velocity_alpha: 0.60

    max_epipolar_error_px: 6.0
    min_disparity_px: 1.0
    max_disparity_px: 1200.0
    max_depth_m: 12.0

    # Transform from OpenCV camera coordinates to chassis coordinates:
    # camera x right, y down, z forward -> chassis x forward, y left, z up.
    # Translation must be measured after the stereo rig is fixed on the chassis.
    camera_translation_m: [0.0, 0.0, 0.0]
    camera_rotation_rpy_rad: [-1.5707963267948966, 0.0, -1.5707963267948966]

    max_pose_age_s: 0.10
    pose_buffer_size: 90
    track_max_age_s: 0.60
    track_max_points: 24
    min_track_points: 3
    new_task_gap_s: 0.40
    initial_task_id: 1
    single_task_mode: false
    single_task_shutdown_on_complete: true

    # RawTarget carries the x/y point and remaining time. Default is the
    # catching plane at field_z=0.6.
    target_plane_z: 0.6
    gravity_mps2: 9.80665
    min_predicted_time: 0.03
    max_predicted_time: 5.0
    min_sigma_m: 0.05
    max_abs_target_x: 15.0
    max_abs_target_y: 8.0

    # When true, the node tolerates missing or non-finite yaw in chassis
    # position messages and chassis position topic inactivity. A synthetic
    # pose (x=0,y=0) with fallback_yaw_rad is used instead. This is a
    # diagnostic mode and should not be used for closed-loop operation.
    allow_missing_yaw: false
    fallback_yaw_rad: 0.0

    runtime_log_enabled: false
    runtime_log_root: runs/vision-runtime
    runtime_log_session: ""
    runtime_log_video: true
    runtime_log_chassis: true
    runtime_log_yolo: true
    runtime_log_targets: true
    runtime_log_events: true
    runtime_log_video_fourcc: mp4v
