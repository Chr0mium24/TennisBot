vision_interface_adapter:
  ros__parameters:
    # External interface topics.
    interface_chassis_topic: /robot/chassis_position
    interface_chassis_state_topic: /robot/chassis_state
    interface_raw_target_topic: /target/raw

    # Vision-side topics owned by this repository.
    vision_chassis_topic: /vision/chassis_position
    vision_chassis_pose_topic: /vision/chassis_pose
    vision_target_topic: /vision/target_prediction

    forward_chassis_position: true
    forward_chassis_pose: true
    forward_target_prediction: true

    # /robot/chassis_state is Float64MultiArray:
    # [x_m, y_m, v_mps, phi_rad, yaw_rad, ground_speed_mps].
    # Use "field" when x/y/yaw are already in the field/interface frame.
    # Use "cartesian" to apply AGENTS.md's field_x=cartesian_y,
    # field_y=-cartesian_x, field_yaw=cartesian_yaw-pi/2 mapping.
    chassis_state_input_frame: field

    # Expected nominal rates are 30 Hz. The adapter only drops messages when
    # inputs exceed these rates; set a value <= 0 to disable a limiter.
    max_chassis_rate_hz: 30.0
    max_chassis_pose_rate_hz: 30.0
    max_target_rate_hz: 30.0
    rate_limit_slack: 0.10

    future_stamp_tolerance: 0.02
    max_predicted_time: 5.0

    # Broad sanity bounds around the tennis court, in metres.
    max_abs_target_x: 15.0
    max_abs_target_y: 8.0
